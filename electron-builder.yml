appId: com.aicanvas.app
productName: AI 画布
copyright: © 2026
directories:
  output: release
  buildResources: build
files:
  - out/**
  - package.json
win:
  target:
    - nsis
  artifactName: ai-canvas-${version}-setup.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: AI 画布
# 自动更新发布到 GitHub Releases；electron-updater 读取此配置
publish:
  provider: github
  owner: dangthiphuong2491991-a11y
  repo: ai-canvas
